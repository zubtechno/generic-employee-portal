services:
  hrm:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/hrm.sqlite
      UPLOAD_FOLDER: /app/app/static/uploads
      SEED_JSON_PATH: /app/seed/employees.json
      TRUST_PROXY: "true"
    ports:
      - "8082:8000"
    volumes:
      - hrm-data:/data
      - hrm-profile-uploads:/app/app/static/uploads/profiles
    restart: unless-stopped

volumes:
  hrm-data:
  hrm-profile-uploads:
